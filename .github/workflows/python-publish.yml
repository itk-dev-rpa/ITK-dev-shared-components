# Publishes a single package to PyPI when a GitHub release is created.
#
# The package to publish is derived from the release tag, which must follow the
# format "<package-name>-v<version>", e.g.:
#   itkdev-sap-v1.2.3                  -> packages/itkdev-sap
#   itk-dev-shared-components-v3.0.0   -> meta/itk-dev-shared-components
#
# This workflow uses actions that are not certified by GitHub.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Determine package directory from tag
      id: pkg
      shell: bash
      run: |
        TAG="${{ github.event.release.tag_name }}"
        NAME="${TAG%-v*}"
        if [ -d "packages/$NAME" ]; then
          echo "dir=packages/$NAME" >> "$GITHUB_OUTPUT"
        elif [ -d "meta/$NAME" ]; then
          echo "dir=meta/$NAME" >> "$GITHUB_OUTPUT"
        else
          echo "::error::No package directory found for tag '$TAG' (derived name '$NAME'). Expected tag format '<package>-v<version>'."
          exit 1
        fi
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Build package
      # Output into the workspace-root dist/ so the publish step finds it by default.
      run: |
        python -m pip install --upgrade pip build
        python -m build "${{ steps.pkg.outputs.dir }}" --outdir dist
    - name: Publish package
      # NOTE: PYPI_API_TOKEN must be an account-scoped token so it can publish any
      # of the itkdev-* projects. Consider migrating to Trusted Publishing (OIDC).
      uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
