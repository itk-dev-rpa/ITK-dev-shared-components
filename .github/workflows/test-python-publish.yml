# Manually publishes a single package to Test PyPI.
# Pick the package folder via the workflow input, e.g. "packages/itkdev-sap"
# or "meta/itk-dev-shared-components".
#
# This workflow uses actions that are not certified by GitHub.

name: Upload Python Test Package

on:
  workflow_dispatch:
    inputs:
      package_dir:
        description: "Path to the package to publish (e.g. packages/itkdev-sap)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Build package
      run: |
        python -m pip install --upgrade pip build
        python -m build "${{ inputs.package_dir }}" --outdir dist
    - name: Publish package
      uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
      with:
        user: __token__
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        repository_url: https://test.pypi.org/legacy/
